<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed — Encarregado de Produção</title>
<style>
  @font-face {
    font-family: 'Moreno';
    src: url('Moreno-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Moreno';
    src: url('Moreno-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ArchivoNarrow';
    src: url('ArchivoNarrow-SemiBold.ttf') format('truetype');
    font-weight: 600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; }

  .feed {
    width: 100vw;
    height: 100vh;
    background: #1B3D2F;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 11vh 12.5vw;
    font-family: 'Moreno', 'Helvetica Neue', sans-serif;
    aspect-ratio: 1 / 1;
  }

  .top-tag {
    position: absolute;
    top: 7.5vh;
    left: 12.5vw;
    font-family: 'ArchivoNarrow', sans-serif;
    font-size: 2.13vw;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.75vw;
    text-transform: uppercase;
  }

  .content {
    display: flex;
    flex-direction: column;
    gap: 4vh;
  }
  .cargo {
    font-weight: 700;
    font-size: 6.25vw;
    color: #FFFFFF;
    line-height: 1.12;
    letter-spacing: 0.13vw;
    text-transform: uppercase;
  }
  .divider {
    width: 9vw;
    height: 0.5vh;
    background: #D7D30E;
    border-radius: 2px;
  }
  .info {
    font-family: 'ArchivoNarrow', sans-serif;
    font-weight: 600;
    font-size: 2.63vw;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.5vw;
    text-transform: uppercase;
  }
  .benefits {
    display: flex;
    flex-direction: column;
    gap: 1.5vh;
  }
  .benefit {
    font-weight: 400;
    font-size: 3.13vw;
    color: rgba(255,255,255,0.55);
  }
  .provocacao {
    font-weight: 400;
    font-size: 2.75vw;
    color: rgba(255,255,255,0.28);
    font-style: italic;
    line-height: 1.55;
    margin-top: 0.5vh;
  }

  .bottom-bar {
    position: absolute;
    bottom: 7vh;
    left: 12.5vw;
    right: 12.5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cta {
    font-family: 'ArchivoNarrow', sans-serif;
    font-size: 2.25vw;
    font-weight: 600;
    color: #D7D30E;
    letter-spacing: 0.63vw;
    text-transform: uppercase;
  }
  .bottom-bar .g-logo { height: 5.5vh; width: auto; opacity: 0.30; }
</style>
</head>
<body>
<div class="feed">
  <div class="top-tag">Vaga aberta</div>
  <div class="content">
    <div class="cargo">Encarregado<br>de Produção</div>
    <div class="divider"></div>
    <div class="info">Caminho das Árvores · Escala 6×1</div>
    <div class="benefits">
      <span class="benefit">Premiação trimestral até 20%</span>
      <span class="benefit">Plano de saúde + alimentação no local</span>
      <span class="benefit">Desconto 10% na loja</span>
    </div>
    <div class="provocacao">Aqui, quem entrega cresce.</div>
  </div>
  <div class="bottom-bar">
    <span class="cta">Candidate-se →</span>
    <img class="g-logo" src="g_gran.svg" alt="g">
  </div>
</div>
</body>
</html>
